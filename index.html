<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f5f7fa">
<title>BISTBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f7fa;--bg2:#fff;--bg3:#f0f2f7;--bg4:#e8ebf2;
  --border:#e2e6ef;--border2:#cdd3e0;
  --accent:#2563eb;--accent2:#1d4ed8;
  --green:#059669;--green2:#10b981;
  --red:#dc2626;--red2:#ef4444;
  --yellow:#d97706;--cyan:#0891b2;
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:10px;--r2:7px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:54px;gap:12px;}
.logo{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--accent);display:flex;align-items:center;gap:8px;white-space:nowrap;}
.logo-badge{background:var(--accent);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-family:var(--sans);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px rgba(5,150,105,.2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.search-wrap{flex:1;max-width:300px;display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0 10px;gap:6px;transition:border-color .15s;}
.search-wrap:focus-within{border-color:var(--accent);}
.search-wrap input{flex:1;background:none;border:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--text);padding:7px 0;}
.search-wrap input::placeholder{color:var(--text3);}
.search-wrap button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(37,99,235,.3);}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text2);}
#menuBtn{display:none;}
.makro-strip{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
.makro-strip::-webkit-scrollbar{display:none;}
.makro-chip{display:flex;flex-direction:column;gap:1px;padding:8px 16px;border-right:1px solid var(--border);flex-shrink:0;}
.makro-chip.rej{margin-left:auto;border-right:none;border-left:1px solid var(--border);}
.ml{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:500;}
.mv{font-family:var(--mono);font-size:13px;font-weight:500;}
.mc{font-family:var(--mono);font-size:10px;}
.layout{display:grid;grid-template-columns:256px 1fr;min-height:calc(100vh - 91px);}
.filterbar{grid-column:1/-1;display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.filterbar::-webkit-scrollbar{display:none;}
.psel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:12px;padding:5px 8px;border-radius:7px;cursor:pointer;outline:none;font-weight:500;}
.fsep{width:1px;height:18px;background:var(--border);flex-shrink:0;}
.chip{padding:4px 11px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0;}
.chip:hover{background:var(--bg3);}
.chip.active,.chip.cGA.active{background:var(--green);border-color:var(--green);color:#fff;}
.chip.cGA{border-color:var(--green);color:var(--green);}
.chip.cAL{border-color:var(--green2);color:var(--green2);}
.chip.cAL.active{background:var(--green2);border-color:var(--green2);color:#fff;}
.chip.cTT{border-color:var(--yellow);color:var(--yellow);}
.chip.cTT.active{background:var(--yellow);border-color:var(--yellow);color:#fff;}
.chip.cST{border-color:var(--red2);color:var(--red2);}
.chip.cST.active{background:var(--red2);border-color:var(--red2);color:#fff;}
.chip.cGS{border-color:var(--red);color:var(--red);}
.chip.cGS.active{background:var(--red);border-color:var(--red);color:#fff;}
.chip.cALL.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.ssel{margin-left:auto;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:12px;padding:5px 8px;border-radius:7px;cursor:pointer;outline:none;flex-shrink:0;}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sbstats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);}
.sbs{padding:10px;text-align:center;border-right:1px solid var(--border);}
.sbs:last-child{border-right:none;}
.sbsv{font-family:var(--mono);font-size:18px;font-weight:500;}
.sbsl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:1px;}
.sblist{flex:1;overflow-y:auto;padding:6px;}
.sblist::-webkit-scrollbar{width:4px;}
.sblist::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
.sbi{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r2);cursor:pointer;transition:background .1s;border:1px solid transparent;margin-bottom:2px;}
.sbi:hover{background:var(--bg3);}
.sbi.active{background:var(--bg3);border-color:var(--border2);}
.sbic{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:500;flex-shrink:0;}
.iGA{background:#dcfce7;color:var(--green);}
.iAL{background:#d1fae5;color:var(--green2);}
.iTT{background:#fef3c7;color:var(--yellow);}
.iST{background:#fee2e2;color:var(--red2);}
.iGS{background:#fecaca;color:var(--red);}
.iLD{background:var(--bg4);color:var(--text3);}
.sbif{flex:1;min-width:0;}
.sbsym{font-family:var(--mono);font-size:13px;font-weight:500;}
.sbpx{font-size:11px;color:var(--text2);margin-top:1px;}
.sbr{text-align:right;flex-shrink:0;}
.sbchg{font-family:var(--mono);font-size:12px;font-weight:500;}
.sbsc{font-size:10px;color:var(--text3);margin-top:1px;}
.sbld{padding:9px 10px;margin-bottom:2px;border-radius:var(--r2);background:var(--bg3);}
.shim{height:11px;border-radius:3px;margin-top:5px;background:linear-gradient(90deg,var(--bg4) 25%,var(--bg2) 50%,var(--bg4) 75%);background-size:200% 100%;animation:sh 1.3s infinite;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.main{background:var(--bg);overflow-y:auto;display:flex;flex-direction:column;}
.empty-st{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px;text-align:center;color:var(--text3);}
.empty-st .ei{font-size:40px;opacity:.4;}
.empty-st .et{font-size:16px;font-weight:500;color:var(--text2);}
.empty-st .es{font-size:13px;max-width:240px;line-height:1.6;}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 14px;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 14px;border:none;background:none;color:var(--text3);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .12s;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tp{display:none;padding:16px;flex:1;}
.tp.active{display:block;}
.detay{display:flex;flex-direction:column;gap:14px;}
.dh{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.dsym{font-family:var(--mono);font-size:26px;font-weight:500;}
.dskt{font-size:13px;color:var(--text2);margin-top:3px;}
.dsec{display:inline-block;margin-top:6px;font-size:11px;padding:3px 8px;border-radius:4px;background:var(--bg4);color:var(--text2);}
.kbadge{padding:7px 14px;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.5px;white-space:nowrap;flex-shrink:0;}
.kGA{background:#dcfce7;color:var(--green);border:1px solid #bbf7d0;}
.kAL{background:#d1fae5;color:var(--green2);border:1px solid #a7f3d0;}
.kTT{background:#fef3c7;color:var(--yellow);border:1px solid #fde68a;}
.kST{background:#fee2e2;color:var(--red2);border:1px solid #fecaca;}
.kGS{background:#fecaca;color:var(--red);border:1px solid #fca5a5;}
.fpx{font-family:var(--mono);font-size:32px;font-weight:500;}
.frow{display:flex;gap:16px;align-items:center;}
.fchg{display:flex;flex-direction:column;gap:4px;}
.fc{display:flex;gap:8px;align-items:center;}
.fcl{font-size:11px;color:var(--text3);width:28px;font-weight:500;}
.fcv{font-family:var(--mono);font-size:12px;font-weight:500;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:600;margin-bottom:10px;}
.cv{font-family:var(--mono);font-size:20px;font-weight:500;}
.cs{font-size:11px;color:var(--text2);margin-top:4px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.srow{display:grid;grid-template-columns:92px 1fr 46px;align-items:center;gap:8px;margin-bottom:7px;}
.sl{font-size:11px;color:var(--text2);font-weight:500;}
.str{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative;}
.sfil{height:100%;border-radius:3px;transition:width .4s;position:absolute;}
.sfil.pos{background:var(--green);right:50%;}
.sfil.neg{background:var(--red);left:50%;}
.smid{position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--border2);}
.sval{font-family:var(--mono);font-size:10px;font-weight:500;text-align:right;}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.ti{background:var(--bg3);border-radius:var(--r2);padding:9px;text-align:center;}
.tl{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;}
.tv{font-family:var(--mono);font-size:13px;font-weight:500;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ri{background:var(--bg3);border-radius:var(--r2);padding:11px;}
.rl{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;}
.rv{font-family:var(--mono);font-size:15px;font-weight:500;}
.proba{display:flex;gap:6px;margin-top:8px;}
.pb{flex:1;padding:8px;border-radius:var(--r2);text-align:center;font-family:var(--mono);font-size:14px;font-weight:500;}
.pb .pl{font-size:10px;color:var(--text3);margin-top:2px;font-weight:400;font-family:var(--sans);}
.pal{background:#dcfce7;border:1px solid #bbf7d0;}
.ptu{background:var(--bg3);border:1px solid var(--border);}
.psa{background:#fef2f2;border:1px solid #fecaca;}
.kitem{padding:10px 12px;border-radius:var(--r2);border-left:3px solid;margin-bottom:6px;background:var(--bg3);}
.kitem.kp{border-color:var(--green);}
.kitem.kn{border-color:var(--red);}
.kitem.kz{border-color:var(--border2);}
.ktur{font-size:11px;color:var(--text2);margin-bottom:3px;}
.kbas{font-size:12px;line-height:1.4;}
.ktar{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono);}
.hitem{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;}
.htxt{font-size:12px;line-height:1.5;color:var(--text2);}
.htar{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:3px;}
.pw{position:fixed;top:54px;left:0;right:0;z-index:99;height:3px;background:var(--bg3);display:none;}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width .25s;}
.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 16px;font-size:13px;max-width:280px;box-shadow:var(--shadow);transform:translateY(80px);opacity:0;transition:all .25s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-left:3px solid var(--green);}
.toast.err{border-left:3px solid var(--red);}
.pos{color:var(--green);}
.neg{color:var(--red);}
.neu{color:var(--text2);}
.fade-in{animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mob-ov{display:none;position:fixed;inset:0;top:54px;background:rgba(0,0,0,.3);z-index:199;}
.mob-ov.open{display:block;}
@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;position:fixed;top:54px;left:0;bottom:0;width:260px;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.15);}
  .sidebar.open{display:flex;}
  #menuBtn{display:flex;}
  .search-wrap{max-width:180px;}
  .g2,.rg{grid-template-columns:1fr 1fr;}
  .tg{grid-template-columns:1fr 1fr;}
  .fpx{font-size:26px;}
  .dsym{font-size:20px;}
  .btn-lbl{display:none;}
  .tp{padding:12px;}
}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
</style>
</head>
<body>
<div class="pw" id="pw"><div class="pf" id="pf" style="width:0%"></div></div>
<div class="mob-ov" id="mobOv" onclick="toggleSb()"></div>
<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="logo">
    <div class="live-dot" id="liveDot"></div>
    BISTBot <div class="logo-badge">v5</div>
  </div>
  <div class="search-wrap">
    <span style="color:var(--text3)">🔍</span>
    <input type="text" id="aramaInp" placeholder="Hisse ara…" oninput="aramaYap(this.value)" autocomplete="off">
    <button onclick="aramaSifirla()">✕</button>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost" id="menuBtn" onclick="toggleSb()">☰</button>
    <button class="btn btn-primary" onclick="yukle(true)">↻ <span class="btn-lbl">Güncelle</span></button>
  </div>
</div>

<div class="makro-strip">
  <div class="makro-chip"><div class="ml">USD/TRY</div><div class="mv" id="mU">—</div><div class="mc" id="mUc"></div></div>
  <div class="makro-chip"><div class="ml">Altın</div><div class="mv" id="mA">—</div><div class="mc" id="mAc"></div></div>
  <div class="makro-chip"><div class="ml">BIST100</div><div class="mv" id="mB">—</div><div class="mc" id="mBc"></div></div>
  <div class="makro-chip"><div class="ml">Petrol</div><div class="mv" id="mP">—</div><div class="mc" id="mPc"></div></div>
  <div class="makro-chip"><div class="ml">EUR/USD</div><div class="mv" id="mE">—</div><div class="mc" id="mEc"></div></div>
  <div class="makro-chip"><div class="ml">VIX</div><div class="mv" id="mV">—</div><div class="mc" id="mVc"></div></div>
  <div class="makro-chip rej"><div class="ml">Rejim</div><div class="mv" id="mR" style="font-size:11px">—</div></div>
</div>

<div class="layout">
  <div class="filterbar">
    <select class="psel" id="presetSel" onchange="yukle(true)">
      <option value="varsayilan">Varsayılan</option>
      <option value="bist30">BIST 30</option>
      <option value="bist50">BIST 50</option>
      <option value="bist100">BIST 100</option>
      <option value="yildiz">Yıldız Pazar</option>
    </select>
    <div class="fsep"></div>
    <button class="chip cALL active" onclick="filtrele('ALL',this)">Tümü <b id="fT">—</b></button>
    <button class="chip cGA" onclick="filtrele('GA',this)">G.AL <b id="fGA">—</b></button>
    <button class="chip cAL" onclick="filtrele('AL',this)">AL <b id="fAL">—</b></button>
    <button class="chip cTT" onclick="filtrele('TT',this)">TUT <b id="fTT">—</b></button>
    <button class="chip cST" onclick="filtrele('ST',this)">SAT <b id="fST">—</b></button>
    <button class="chip cGS" onclick="filtrele('GS',this)">G.SAT <b id="fGS">—</b></button>
    <select class="ssel" id="sortSel" onchange="renderListe()">
      <option value="bs">↓ Birleşik Skor</option>
      <option value="gunluk">↓ Günlük %</option>
      <option value="ml">↓ ML Skor</option>
      <option value="fiyat">↓ Fiyat</option>
    </select>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sbstats">
      <div class="sbs"><div class="sbsv pos" id="stAL">—</div><div class="sbsl">Al</div></div>
      <div class="sbs"><div class="sbsv neu" id="stTT">—</div><div class="sbsl">Tut</div></div>
      <div class="sbs"><div class="sbsv neg" id="stST">—</div><div class="sbsl">Sat</div></div>
    </div>
    <div class="sblist" id="sbList"></div>
  </div>

  <div class="main" id="mainPanel">
    <div class="empty-st" id="emptySt">
      <div class="ei">📊</div>
      <div class="et">Hisse seçin</div>
      <div class="es">Sol listeden bir hisse seçerek analiz görüntüleyin</div>
    </div>
    <div id="detayWrap" style="display:none;flex-direction:column;">
      <div class="tabs">
        <button class="tab active" onclick="sekme('Analiz',this)">Analiz</button>
        <button class="tab" onclick="sekme('Teknik',this)">Teknik</button>
        <button class="tab" onclick="sekme('Ml',this)">ML</button>
        <button class="tab" onclick="sekme('Kap',this)">KAP</button>
        <button class="tab" onclick="sekme('Duygu',this)">Haberler</button>
        <button class="tab" onclick="sekme('Bt',this)">Backtest</button>
      </div>
      <div id="tpAnaliz" class="tp active"></div>
      <div id="tpTeknik" class="tp"></div>
      <div id="tpMl" class="tp"></div>
      <div id="tpKap" class="tp"></div>
      <div id="tpDuygu" class="tp"></div>
      <div id="tpBt" class="tp"></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const BACKEND = (()=>{
  const h=location.hostname;
  if(h==='localhost'||h==='127.0.0.1') return '';
  return 'https://bistbot-ains.onrender.com'; // ← Render URL
})();
const api=p=>BACKEND+p;

// ── STATE ───────────────────────────────────────────────────────
let veri={},aktifSym=null,aktifFiltre='ALL';
let yukleniyor=false,toplamB=0,toplamG=0;

// ── YARDIMCI ────────────────────────────────────────────────────
const f2=(n,d=2)=>n==null?'—':Number(n).toFixed(d);
const fp=(n,d=1)=>n==null?'—':(n>=0?'+':'')+Number(n).toFixed(d)+'%';
const ftl=n=>n==null?'—':Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺';
const pc=n=>n>0?'pos':n<0?'neg':'neu';

function sbH(s){
  const pct=(Math.min(Math.abs(s||0),1)*50).toFixed(1);
  const c=(s||0)>=0?'pos':'neg';
  return `<div class="str"><div class="smid"></div><div class="sfil ${c}" style="width:${pct}%"></div></div>`;
}
const BADGE={'GÜÇLÜ AL':'iGA','AL':'iAL','TUT':'iTT','SAT':'iST','GÜÇLÜ SAT':'iGS'};
const KBADGE={'GÜÇLÜ AL':'kGA','AL':'kAL','TUT':'kTT','SAT':'kST','GÜÇLÜ SAT':'kGS'};
const ABBR={'GÜÇLÜ AL':'G.AL','AL':'AL','TUT':'TUT','SAT':'SAT','GÜÇLÜ SAT':'G.SAT'};

function showToast(msg,tip='ok',ms=3000){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+tip+' show';
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms);
}
function setLive(s){
  const d=document.getElementById('liveDot');
  d.style.background=s==='ok'?'var(--green)':s==='err'?'var(--red)':'var(--yellow)';
}
function toggleSb(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobOv').classList.toggle('open');
}
window.addEventListener('resize',()=>{
  if(window.innerWidth>768){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('mobOv').classList.remove('open');
  }
});

// ── MAKRO ───────────────────────────────────────────────────────
async function makroYukle(){
  try{
    const r=await fetch(api('/api/makro'));if(!r.ok)return;
    const d=await r.json();
    const set=(vi,ci,key,dec=2)=>{
      const m=d[key]||{};const v=m.son||0;const c=(m.ret1d||0)*100;
      document.getElementById(vi).textContent=v>0?Number(v).toFixed(dec):'—';
      const cel=document.getElementById(ci);
      cel.textContent=v>0?fp(c):'';cel.className='mc '+(c>0?'pos':c<0?'neg':'');
    };
    set('mU','mUc','usdtry',2);set('mA','mAc','altin',0);
    set('mB','mBc','bist100',0);set('mP','mPc','petrol',1);
    set('mE','mEc','eurusd',4);set('mV','mVc','vix',1);
  }catch{}
}

// ── ARAMA ───────────────────────────────────────────────────────
function aramaYap(q){
  q=q.trim().toUpperCase();
  document.querySelectorAll('#sbList .sbi,#sbList .sbld').forEach(el=>{
    const s=(el.dataset.sym||'').toUpperCase();
    const k=(el.dataset.k||'').toUpperCase();
    el.style.display=(!q||s.includes(q)||k.includes(q))?'':'none';
  });
}
function aramaSifirla(){document.getElementById('aramaInp').value='';aramaYap('');}

// ── LİSTE ───────────────────────────────────────────────────────
function filtrele(k,btn){
  aktifFiltre=k;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  btn?.classList.add('active');
  renderListe();
}

function renderListe(){
  const sort=document.getElementById('sortSel').value;
  const MAP={GA:'GÜÇLÜ AL',AL:'AL',TT:'TUT',ST:'SAT',GS:'GÜÇLÜ SAT'};
  let liste=Object.values(veri).filter(d=>d&&!d.hata);
  if(aktifFiltre!=='ALL')liste=liste.filter(d=>d.karar===MAP[aktifFiltre]);
  liste.sort((a,b)=>{
    if(sort==='bs')return(b.birlesik||0)-(a.birlesik||0);
    if(sort==='gunluk')return(b.gunluk||0)-(a.gunluk||0);
    if(sort==='ml')return(b.ml_skor||0)-(a.ml_skor||0);
    if(sort==='fiyat')return(b.fiyat||0)-(a.fiyat||0);
    return 0;
  });
  const sb=document.getElementById('sbList');
  liste.forEach(d=>{const el=document.getElementById('si-'+d.sembol);if(el)sb.appendChild(el);});
  const all=Object.values(veri).filter(d=>d&&!d.hata);
  const cnt=k=>all.filter(d=>d.karar===k).length;
  document.getElementById('fT').textContent=all.length;
  document.getElementById('fGA').textContent=cnt('GÜÇLÜ AL');
  document.getElementById('fAL').textContent=cnt('AL');
  document.getElementById('fTT').textContent=cnt('TUT');
  document.getElementById('fST').textContent=cnt('SAT');
  document.getElementById('fGS').textContent=cnt('GÜÇLÜ SAT');
  document.getElementById('stAL').textContent=cnt('GÜÇLÜ AL')+cnt('AL');
  document.getElementById('stTT').textContent=cnt('TUT');
  document.getElementById('stST').textContent=cnt('GÜÇLÜ SAT')+cnt('SAT');
  const r=all.length&&all[0].piyasa_rejimi;
  if(r)document.getElementById('mR').textContent=r.etiket||'—';
}

function guncelItem(d){
  const old=document.getElementById('sL-'+d.sembol)||document.getElementById('si-'+d.sembol);
  const el=document.createElement('div');
  el.className='sbi'+(aktifSym===d.sembol?' active':'');
  el.id='si-'+d.sembol;el.dataset.sym=d.sembol;el.dataset.k=d.sirket||'';
  el.onclick=()=>secHisse(d.sembol);
  const bc=BADGE[d.karar]||'iLD';
  const ab=ABBR[d.karar]||'—';
  const cc=(d.gunluk||0)>0?'pos':(d.gunluk||0)<0?'neg':'neu';
  el.innerHTML=`<div class="sbic ${bc}">${ab}</div>
    <div class="sbif"><div class="sbsym">${d.sembol}</div><div class="sbpx">${ftl(d.fiyat)}</div></div>
    <div class="sbr"><div class="sbchg ${cc}">${fp(d.gunluk)}</div><div class="sbsc">${f2(d.birlesik,3)}</div></div>`;
  old?old.replaceWith(el):document.getElementById('sbList').appendChild(el);
}

// ── YUKLE ───────────────────────────────────────────────────────
async function yukle(manuel=false){
  if(yukleniyor)return;
  yukleniyor=true;toplamG=0;
  const pw=document.getElementById('pw');
  const pf=document.getElementById('pf');
  pw.style.display='block';pf.style.width='0%';
  setLive('loading');

  try{
    const lr=await fetch(api('/api/liste'));
    if(!lr.ok)throw new Error('Liste: '+lr.status);
    const liste=await lr.json();
    const preset=document.getElementById('presetSel').value;
    const hisseler=
      preset==='bist30'?liste.bist30:
      preset==='bist50'?liste.bist50:
      preset==='bist100'?liste.bist100:
      preset==='yildiz'?liste.yildiz:
      (liste.varsayilan||[]);

    toplamB=hisseler.length;
    if(!toplamB){showToast('Hisse listesi boş','err');return;}

    const sb=document.getElementById('sbList');
    sb.innerHTML=hisseler.map(s=>`
      <div class="sbld" id="sL-${s}" data-sym="${s}">
        <div style="font-family:var(--mono);font-size:11px;color:var(--text3)">${s}</div>
        <div class="shim" style="width:70%"></div>
      </div>`).join('');

    const BATCH=5;
    const fetchOne=async s=>{
      try{
        const r=await fetch(api('/api/analiz/'+s));
        if(!r.ok)throw new Error(r.status);
        const d=await r.json();
        toplamG++;
        pf.style.width=(toplamG/toplamB*100).toFixed(0)+'%';
        if(!d.hata){veri[d.sembol]=d;guncelItem(d);}
        else document.getElementById('sL-'+s)?.remove();
        renderListe();
        if(aktifSym===s&&veri[s])renderDetay(veri[s]);
      }catch(e){
        console.warn(s,e.message);
        document.getElementById('sL-'+s)?.remove();
        toplamG++;pf.style.width=(toplamG/toplamB*100).toFixed(0)+'%';
      }
    };

    for(let i=0;i<hisseler.length;i+=BATCH){
      await Promise.all(hisseler.slice(i,i+BATCH).map(fetchOne));
    }
    renderListe();setLive('ok');
    showToast(Object.keys(veri).length+' hisse yüklendi','ok');
  }catch(e){
    console.error(e);setLive('err');
    showToast('Bağlantı hatası — backend çalışıyor mu?','err');
    document.getElementById('sbList').innerHTML='<div style="padding:20px;text-align:center;color:var(--red);font-size:13px">⚠ API bağlantısı kurulamadı</div>';
  }finally{
    yukleniyor=false;setTimeout(()=>pw.style.display='none',600);
  }
}

// ── SEÇ ────────────────────────────────────────────────────────
function secHisse(sym){
  aktifSym=sym;
  document.querySelectorAll('.sbi').forEach(e=>e.classList.remove('active'));
  document.getElementById('si-'+sym)?.classList.add('active');
  document.getElementById('emptySt').style.display='none';
  document.getElementById('detayWrap').style.display='flex';
  if(veri[sym])renderDetay(veri[sym]);
  if(window.innerWidth<=768)toggleSb();
}

// ── SEKME ───────────────────────────────────────────────────────
function sekme(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  btn?.classList.add('active');
  const panel=document.getElementById('tp'+id);
  if(panel)panel.classList.add('active');
  if(id==='Kap'  &&panel&&!panel._ld){panel._ld=true;renderKap(panel);}
  if(id==='Duygu'&&panel&&!panel._ld){panel._ld=true;renderDuygu(panel);}
  if(id==='Bt'   &&panel&&!panel._ld){panel._ld=true;renderBt(panel);}
}

// ── DETAY ───────────────────────────────────────────────────────

  ['Kap','Duygu','Bt'].forEach(id=>{const p=document.getElementById('tp'+id);if(p)p._ld=false;});

  const ol=d.ml_olasilik||{},kelly=d.kelly||{};

    <div class="dh">
      <div>
        <div class="dsym">${d.sembol}</div>

    </div>
    <div class="frow">
      <div class="fpx">${ftl(d.fiyat)}</div>
      <div class="fchg">
        <div class="fc"><span class="fcl">1G</span><span class="fcv ${pc(d.gunluk)}">${fp(d.gunluk)}</span></div>
        <div class="fc"><span class="fcl">1H</span><span class="fcv ${pc(d.haftalik)}">${fp(d.haftalik)}</span></div>
        <div class="fc"><span class="fcl">1A</span><span class="fcv ${pc(d.aylik)}">${fp(d.aylik)}</span></div>
      </div>
    </div>
    <div class="card">
      <div class="ct">Birleşik Skor</div>
      ${[['BİRLEŞİK',d.birlesik],['TEKNİK %30',d.teknik_skor],['ML %30',d.ml_skor],
         ['DUYGU %10',d.duygu_skor],['KAP %10',d.kap_skor||0],['TEMEL %10',d.temel_skor],
         ['ANALİST %5',d.analist_skor||0],['ARIMA %5',d.arima_skor||0]
        ].map(([l,s])=>`<div class="srow"><div class="sl">${l}</div>${sbH(s)}<div class="sval ${pc(s)}">${(s>=0?'+':'')+f2(s,3)}</div></div>`).join('')}
    </div>
    <div class="card">
      <div class="ct">Risk & Hedef</div>
      <div class="rg">
        <div class="ri"><div class="rl">Hedef</div><div class="rv pos">${ftl(d.hedef)}</div></div>
        <div class="ri"><div class="rl">Stop-Loss</div><div class="rv neg">${ftl(d.stop)}</div></div>
        <div class="ri"><div class="rl">Risk/Ödül</div><div class="rv">${d.risk_odul>0?'1:'+f2(d.risk_odul,1):'—'}</div></div>
        <div class="ri"><div class="rl">Kelly ½</div><div class="rv" style="color:var(--accent)">${kelly.yari_kelly>0?'%'+(kelly.yari_kelly*100).toFixed(0):'—'}</div></div>
      </div>
    </div>
    <div class="g2">
      <div class="card">
        <div class="ct">Analist</div>
        <div style="font-weight:600;margin-bottom:4px">${an.oneri||'Veri yok'}</div>
        ${an.hedef_fiyat?`<div class="cs">Hedef: ${ftl(an.hedef_fiyat)}</div>`:''}
        ${an.potansiyel!=null?`<div class="cs ${pc(an.potansiyel)}">${fp(an.potansiyel)}</div>`:''}
      </div>
      <div class="card">
        <div class="ct">ARIMA (${ar.gun||10}g)</div>
        <div style="font-weight:600;color:var(--cyan);margin-bottom:4px">${ar.tahmini_fiyat?ftl(ar.tahmini_fiyat):'—'}</div>
        ${ar.potansiyel!=null?`<div class="cs ${pc(ar.potansiyel)}">${fp(ar.potansiyel)}</div>`:''}
        ${ar.guven!=null?`<div class="cs">Güven: %${(ar.guven*100).toFixed(0)}</div>`:''}
      </div>
    </div>
    ${d.temel&&Object.keys(d.temel).length?`<div class="card"><div class="ct">Temel Analiz</div><div class="tg">
      ${Object.entries(d.temel).slice(0,6).map(([k,v])=>`<div class="ti"><div class="tl">${k}</div><div class="tv">${v}</div></div>`).join('')}
    </div></div>`:''}
  </div>`;

  document.getElementById('tpTeknik').innerHTML=`<div class="detay fade-in">
    <div class="card"><div class="ct">Osilatörler</div><div class="tg">
      ${[['RSI',f2(t.rsi),t.rsi<30?'pos':t.rsi>70?'neg':''],
         ['MACD',f2(t.macd,4),t.macd>0?'pos':'neg'],
         ['Stoch K',f2(t.stoch_k),t.stoch_k<20?'pos':t.stoch_k>80?'neg':''],
         ['CCI',f2(t.cci),t.cci<-100?'pos':t.cci>100?'neg':''],
         ['Williams',f2(t.williams_r),t.williams_r<-80?'pos':t.williams_r>-20?'neg':''],
         ['ROC',f2(t.roc)+'%',t.roc>0?'pos':'neg']
        ].map(([l,v,c])=>`<div class="ti"><div class="tl">${l}</div><div class="tv ${c}">${v}</div></div>`).join('')}
    </div></div>
    <div class="card" style="margin-top:12px"><div class="ct">Hareketli Ortalamalar</div><div class="tg">
      ${[['SMA20',ftl(t.sma20)],['SMA50',ftl(t.sma50)],['SMA200',ftl(t.sma200)],

        ].map(([l,v])=>`<div class="ti"><div class="tl">${l}</div><div class="tv">${v}</div></div>`).join('')}
    </div></div>

      ${[['BB Üst',ftl(t.bb_ust)],['BB Alt',ftl(t.bb_alt)],['OBV',t.obv_trend||'—'],

function renderKap(panel){
  if(!aktifSym||!veri[aktifSym]){panel.innerHTML='<div style="padding:20px;color:var(--text3)">Hisse seçilmedi</div>';return;}
  const d=veri[aktifSym],kap=d.kap||{},bil=kap.bildirimleri||[];
  panel.innerHTML=`<div class="detay fade-in">
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">${kap.ozet||'KAP verisi yok'}</p>
    ${kap.en_onemli?`<div class="card" style="margin-bottom:12px;border-left:3px solid ${kap.en_onemli.skor>0?'var(--green)':'var(--red)'}">
      <div class="ct">En Önemli</div>
      <div style="font-weight:600;margin-bottom:4px">${kap.en_onemli.tur}</div>
      <div style="font-size:12px;color:var(--text2)">${kap.en_onemli.baslik}</div>
    </div>`:''}
    ${bil.map(b=>`<div class="kitem ${b.skor>0.1?'kp':b.skor<-0.1?'kn':'kz'}">
      <div class="ktur">${b.tur}</div><div class="kbas">${b.baslik}</div><div class="ktar">${b.tarih}</div>
    </div>`).join('')||'<p style="color:var(--text3);font-size:13px">Bildirim bulunamadı</p>'}
    <a href="https://www.kap.org.tr/tr/bist-sirketler/${d.sembol}" target="_blank" style="display:inline-block;margin-top:12px;color:var(--accent);font-size:13px">KAP'ta aç →</a>
  </div>`;
}

function renderDuygu(panel){

    <div class="card" style="margin-bottom:12px">
      <div class="ct">Duygu Skoru</div>
      <div class="cv ${pc(dy.skor)}">${dy.seviye||'—'}</div>
      <div class="cs">${dy.pozitif||0} olumlu · ${dy.negatif||0} olumsuz</div>

async function renderBt(panel){
  if(!aktifSym){panel.innerHTML='<div style="padding:20px;color:var(--text3)">Hisse seçilmedi</div>';return;}
  panel.innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">⏳ Hesaplanıyor…<br><small style="color:var(--text3)">~30 saniye</small></div>';
  try{
    const r=await fetch(api('/api/backtest/'+aktifSym));
    const d=await r.json();
    if(d.hata){panel.innerHTML=`<div style="padding:20px;color:var(--red)">${d.hata}</div>`;return;}
    const tg=d.toplam_getiri||0,bh=d.bh_getiri||0;
    panel.innerHTML=`<div class="detay fade-in">
      <div class="g2">
        ${[['Toplam Getiri',fp(tg),pc(tg)],['B&H Getiri',fp(bh),pc(bh)],
           ['Kazanma %',f2(d.kazanma_orani,1)+'%',d.kazanma_orani>=50?'pos':'neg'],
           ['Sharpe',f2(d.sharpe,2),d.sharpe>=1?'pos':d.sharpe>=0?'neu':'neg']
          ].map(([l,v,c])=>`<div class="card" style="text-align:center"><div class="ct">${l}</div><div class="cv ${c}" style="font-size:20px">${v}</div></div>`).join('')}
      </div>
      <div class="card" style="margin-top:12px">
        <div class="ct">${d.pencere_sayisi} Pencere — Walk-Forward</div>
        ${(d.son_islemler||[]).slice(-8).map(i=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
            <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${i.tarih}</span>
            <span style="font-weight:600;color:${i.sinyal==='AL'?'var(--green)':'var(--red)'}">${i.sinyal}</span>
            <span style="font-family:var(--mono);font-size:12px">${i.fiyat}₺</span>
          </div>`).join('')||'<p style="color:var(--text3);font-size:12px;margin-top:6px">İşlem yok</p>'}
      </div>
    </div>`;
  }catch{panel.innerHTML='<div style="padding:20px;color:var(--red)">Bağlantı hatası</div>';}
}

async function init(){
  try{await fetch(api('/api/ping'));}catch{}
  makroYukle();
  yukle();
  setInterval(makroYukle,30*60*1000);
  setInterval(()=>{try{fetch(api('/api/ping'));}catch{}},10*60*1000);
}
init();
</script>
