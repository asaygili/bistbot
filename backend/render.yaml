services:
  - type: web
    name: bistbot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bist_server:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/ping
    autoDeploy: true
